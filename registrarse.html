<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="registro.css">
    <link rel="stylesheet" href="fondo.css">
</head>
<body>
    <div class="fondo-estrellas">
        <div id="stars"></div>
        <div id="stars2"></div>
        <div id="stars3"></div>
    </div>
    <div class="login-box">
        <h2>Login</h2>
        <form id="formRegistro" action="index.html">
            <div class="user-box">
                <input type="text" name="email" required>
                <label>Email</label>
            </div>

            <div class="user-box password-box">
                <input type="password" id="password" name="password" required>
                <label>Password</label>
                <button type="button" class="toggle-password" data-target="password">👁</button>
            </div>

            <div class="user-box password-box">
                <input type="password" id="confirm_password" name="confirm_password" required>
                <label>Confirm the password</label>
                <button type="button" class="toggle-password" data-target="confirm_password">👁</button>
            </div>

            <p id="mensajeError"></p>

            <div class="user-box">
                <button type="submit" id="Boton_enviar_register">
                    
                    Submit
                </button>
            </div>
        </form>
    </div>

    <script src="registro.js"></script>
</body>
</html>
